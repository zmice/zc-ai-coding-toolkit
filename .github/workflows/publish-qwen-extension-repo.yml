name: Publish Qwen Extension Repo

on:
  push:
    tags:
      - "@zmice/zc@*"
  workflow_dispatch:
    inputs:
      target_branch:
        description: "目标分支"
        required: false
        default: "main"
        type: string
      commit_message:
        description: "同步提交信息"
        required: false
        default: "chore: sync qwen extension bundle"
        type: string

permissions:
  contents: read

jobs:
  publish-qwen-extension-repo:
    name: export and sync qwen extension repo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      EXTENSION_REPO_TOKEN: ${{ secrets.QWEN_EXTENSION_REPO_TOKEN }}
      EXTENSION_REPO: "zmice/zc-qwen-extension"
      EXTENSION_BRANCH: "${{ github.event.inputs.target_branch || 'main' }}"
      EXTENSION_COMMIT_MESSAGE: "${{ github.event.inputs.commit_message || 'chore: sync qwen extension bundle' }}"

    steps:
      - name: Validate token
        run: |
          if [ -z "$EXTENSION_REPO_TOKEN" ]; then
            echo "缺少 secret：QWEN_EXTENSION_REPO_TOKEN" >&2
            exit 1
          fi

      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --dir apps/cli build

      - name: Export qwen release bundle
        run: node scripts/export-qwen-extension-bundle.mjs --out "$RUNNER_TEMP/qwen-extension"

      - name: Prepare target extension repository
        run: |
          mkdir -p .qwen-extension-repo
          cd .qwen-extension-repo
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${EXTENSION_REPO_TOKEN}@github.com/${EXTENSION_REPO}.git"

          if git ls-remote --exit-code --heads origin "$EXTENSION_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$EXTENSION_BRANCH"
            git checkout -B "$EXTENSION_BRANCH" "origin/$EXTENSION_BRANCH"
          else
            git checkout --orphan "$EXTENSION_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

      - name: Sync bundle to target repository
        run: |
          rsync -a --delete --exclude '.git/' "$RUNNER_TEMP/qwen-extension/" ".qwen-extension-repo/"

      - name: Commit and push if changed
        working-directory: .qwen-extension-repo
        run: |
          if git diff --quiet -- . && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to publish."
            exit 0
          fi

          git add .
          git commit -m "$EXTENSION_COMMIT_MESSAGE"
          git push origin "HEAD:$EXTENSION_BRANCH"
